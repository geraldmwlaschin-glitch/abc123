<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UFOfighter</title>

<style>
body{
    margin:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

canvas{
    border:2px solid cyan;
    background:#141432;
}
</style>

</head>
<body>

<canvas id="game" width="800" height="600"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

const W = canvas.width
const H = canvas.height

/* ---------------- PLAYER ---------------- */

let player = {
    x: W/2,
    y: H/2,
    r: 20,
    boost:false,
    bullets:[],
    rapid:false,
    rapidEnd:0,
    lastShot:0
}

/* ---------------- GAME STATE ---------------- */

let enemies=[]
let powerups=[]
let score=0
let combo=0
let comboTimer=0
let paused=false
let gameOver=false
let startTime=Date.now()

/* ---------------- INPUT ---------------- */

const keys={}
let mouse={x:W/2,y:H/2,down:false}

window.addEventListener("keydown",e=>{
    keys[e.key.toLowerCase()]=true

    if(e.key===" ") player.boost=true
    if(e.key==="c") paused=!paused
    if(e.key==="r" && gameOver) restart()
})

window.addEventListener("keyup",e=>{
    keys[e.key.toLowerCase()]=false
    if(e.key===" ") player.boost=false
})

canvas.addEventListener("mousemove",e=>{
    const rect=canvas.getBoundingClientRect()
    mouse.x=e.clientX-rect.left
    mouse.y=e.clientY-rect.top
})

window.addEventListener("mousedown",()=>mouse.down=true)
window.addEventListener("mouseup",()=>mouse.down=false)

/* ---------------- SPAWN ---------------- */

function spawnEnemy(){

    const side=Math.floor(Math.random()*4)
    let x,y

    if(side===0){x=Math.random()*W;y=-20}
    if(side===1){x=Math.random()*W;y=H+20}
    if(side===2){x=-20;y=Math.random()*H}
    if(side===3){x=W+20;y=Math.random()*H}

    enemies.push({
        x,y,
        r:12,
        speed:1.5
    })
}

function spawnPower(x,y){

    const type=Math.random()<0.5?"score":"rapid"

    powerups.push({
        x,y,
        r:8,
        type,
        life:300
    })
}

/* ---------------- BULLETS ---------------- */

function shoot(tx,ty){

    const dx=tx-player.x
    const dy=ty-player.y
    const d=Math.hypot(dx,dy)

    if(d===0)return

    player.bullets.push({
        x:player.x,
        y:player.y,
        vx:dx/d*8,
        vy:dy/d*8,
        r:4
    })

    player.lastShot=Date.now()
}

/* ---------------- UPDATE ---------------- */

function update(){

if(!paused && !gameOver){

/* movement */

let speed=player.boost?6:4

if(keys["w"]) player.y-=speed
if(keys["s"]) player.y+=speed
if(keys["a"]) player.x-=speed
if(keys["d"]) player.x+=speed

player.x=Math.max(20,Math.min(W-20,player.x))
player.y=Math.max(20,Math.min(H-20,player.y))

/* shooting */

if(mouse.down){

let cd=player.rapid?40:120

if(Date.now()-player.lastShot>cd){
shoot(mouse.x,mouse.y)
}

}

/* bullets */

for(let i=player.bullets.length-1;i>=0;i--){

let b=player.bullets[i]

b.x+=b.vx
b.y+=b.vy

if(b.x<-10||b.x>W+10||b.y<-10||b.y>H+10)
player.bullets.splice(i,1)
}

/* enemies */

for(let i=enemies.length-1;i>=0;i--){

let e=enemies[i]

let dx=player.x-e.x
let dy=player.y-e.y
let d=Math.hypot(dx,dy)

e.x+=dx/d*e.speed
e.y+=dy/d*e.speed

/* bullet collision */

for(let j=player.bullets.length-1;j>=0;j--){

let b=player.bullets[j]

if(Math.hypot(b.x-e.x,b.y-e.y)<20){

player.bullets.splice(j,1)
enemies.splice(i,1)

score+=10
combo++
comboTimer=120

if(Math.random()<0.3)
spawnPower(e.x,e.y)

break
}

}

/* player hit */

if(Math.hypot(player.x-e.x,player.y-e.y)<30)
gameOver=true
}

/* powerups */

for(let i=powerups.length-1;i>=0;i--){

let p=powerups[i]

p.life--

if(p.life<=0){
powerups.splice(i,1)
continue
}

if(Math.hypot(player.x-p.x,player.y-p.y)<30){

if(p.type==="score") score+=50

if(p.type==="rapid"){
player.rapid=true
player.rapidEnd=Date.now()+5000
}

powerups.splice(i,1)
}
}

/* combo */

if(comboTimer>0) comboTimer--
else combo=0

/* rapid expire */

if(player.rapid && Date.now()>player.rapidEnd)
player.rapid=false

/* spawn enemies */

if(Math.random()<0.02)
spawnEnemy()

}

draw()
requestAnimationFrame(update)

}

/* ---------------- DRAW ---------------- */

function draw(){

ctx.fillStyle="#141432"
ctx.fillRect(0,0,W,H)

/* player */

ctx.fillStyle="cyan"
ctx.beginPath()
ctx.arc(player.x,player.y,player.r,0,Math.PI*2)
ctx.fill()

/* bullets */

ctx.fillStyle="lime"

player.bullets.forEach(b=>{
ctx.beginPath()
ctx.arc(b.x,b.y,b.r,0,Math.PI*2)
ctx.fill()
})

/* enemies */

ctx.fillStyle="red"

enemies.forEach(e=>{
ctx.beginPath()
ctx.arc(e.x,e.y,e.r,0,Math.PI*2)
ctx.fill()
})

/* powerups */

powerups.forEach(p=>{

ctx.fillStyle=p.type==="rapid"?"orange":"gold"

ctx.beginPath()
ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
ctx.fill()

})

/* HUD */

ctx.fillStyle="white"
ctx.font="24px Arial"

let time=Math.floor((Date.now()-startTime)/1000)

ctx.fillText("Time: "+time,10,30)
ctx.fillText("Score: "+score,10,60)

if(combo>1)
ctx.fillText("COMBO x"+combo,600,40)

if(player.rapid)
ctx.fillText("Rapid Fire!",10,90)

/* game over */

if(gameOver){

ctx.fillStyle="rgba(0,0,0,0.6)"
ctx.fillRect(0,0,W,H)

ctx.fillStyle="red"
ctx.font="50px Arial"
ctx.textAlign="center"

ctx.fillText("YOU DIED",W/2,H/2)

ctx.font="25px Arial"
ctx.fillText("Press R to Restart",W/2,H/2+50)

ctx.textAlign="left"

}

}

/* ---------------- RESET ---------------- */

function restart(){

player.x=W/2
player.y=H/2
player.bullets=[]
player.rapid=false

enemies=[]
powerups=[]

score=0
combo=0
gameOver=false
startTime=Date.now()

}

/* start game */

spawnEnemy()
update()

</script>

</body>
</html>
